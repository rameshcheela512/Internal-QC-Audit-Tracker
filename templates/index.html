<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Quality Audit Tracker</title>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 1.2rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #219653;
        }

        .dashboard-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 992px) {
            .dashboard-charts {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Selectsys Internal Quality Audit Tracker</h1>
        <p>Real-time Process Control & Team Accuracy Analytics Report</p>
    </header>

    <div class="main-layout">
        <!-- Left Side: Audit Logging Form -->
        <div class="card">
            <h2>Log Process Discrepancy</h2>
            <form id="auditForm">
                <div class="form-group">
                    <label for="teamName">Target Process Team</label>
                    <select id="teamName" required>
                        <option value="Team Gatekeeping">Team Gatekeeping</option>
                        <option value="Team Cl">Team Cl</option>
                        <option value="Team ISC Transporation">Team ISC Transporation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="auditorName">Auditor Name</label>
                    <input type="text" id="auditorName" placeholder="Enter Name" required>
                </div>
                <div class="form-group">
                    <label for="errorType">Observed Error Type</label>
                    <select id="errorType" required>
                        <option value="Select Option">Select Option</option>
                        <option value="premium Mis Match">Premium mismatch</option>
                        <option value="Data Miss Match">Data Miss Match</option>
                        <option value="Wrong Mail">Wrong Mail</option>
                        <option value="Filenote Mistake">Filenote Mistake</option>
                        <option value="Documentation Error">Documentation Error</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Audit Action Status</label>
                    <select id="status" required>
                        <option value="Pending">Pending Review</option>
                        <option value="Resolved">Resolved / Corrected</option>
                    </select>
                </div>
                <button type="submit">Submit QC Log</button>
            </form>
        </div>

        <!-- Right Side: JavaScript Interactive Metrics Dashboard -->
        <div class="card">
            <h2>Real-time Quality Analytics</h2>
            <div class="dashboard-charts">
                <div>
                    <h3 style="font-size:0.9rem; text-align:center; margin-bottom:10px;">Errors Identified Per Team</h3>
                    <div class="chart-container">
                        <canvas id="teamChart"></canvas>
                    </div>
                </div>
                <div>
                    <h3 style="font-size:0.9rem; text-align:center; margin-bottom:10px;">Error Distribution Analysis</h3>
                    <div class="chart-container">
                        <canvas id="errorChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let teamChart, errorChart;

    // Fetch metric data from Flask API and render/update interactive charts
    async function updateDashboard() {
        const response = await fetch('/api/dashboard_data');
        const data = await response.json();

        const teamLabels = data.teams.map(item => item.team_name);
        const teamCounts = data.teams.map(item => item.count);

        const errorLabels = data.errors.map(item => item.error_type);
        const errorCounts = data.errors.map(item => item.count);

        // Render or Update Bar Chart for Teams
        if (teamChart) {
            teamChart.data.labels = teamLabels;
            teamChart.data.datasets[0].data = teamCounts;
            teamChart.update();
        } else {
            const ctxTeam = document.getElementById('teamChart').getContext('2d');
            teamChart = new Chart(ctxTeam, {
                type: 'bar',
                data: {
                    labels: teamLabels,
                    datasets: [{
                        label: 'Errors Caught',
                        data: teamCounts,
                        backgroundColor: '#3498db'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Render or Update Pie Chart for Error Distribution
        if (errorChart) {
            errorChart.data.labels = errorLabels;
            errorChart.data.datasets[0].data = errorCounts;
            errorChart.update();
        } else {
            const ctxError = document.getElementById('errorChart').getContext('2d');
            errorChart = new Chart(ctxError, {
                type: 'pie',
                data: {
                    labels: errorLabels,
                    datasets: [{
                        data: errorCounts,
                        backgroundColor: ['#e74c3c', '#f1c40f', '#9b59b6']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    }

    // Handle Form submission via asynchronous AJAX Fetch requests
    document.getElementById('auditForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const payload = {
            team_name: document.getElementById('teamName').value,
            auditor_name: document.getElementById('auditorName').value,
            error_type: document.getElementById('errorType').value,
            status: document.getElementById('status').value
        };

        const response = await fetch('/api/log_error', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        if(result.status === 'success') {
            alert(result.message);
            document.getElementById('auditForm').reset();
            updateDashboard(); // Instantly update chart elements dynamically without screen refresh
        } else {
            alert('Error: ' + result.message);
        }
    });

    // Run dashboard metrics gathering on page load
    updateDashboard();
</script>
</body>
</html>
